<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Metallic.V1 — Private Cognitive Shell</title>
<meta name="description" content="128 AI agents. 42 models. 248 skill modules. Your private cognitive layer — built for founders, operators, and builders."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
/* ================================================================
   METALLIC.V1 — Design System
   ================================================================ */
:root {
  --bg:        #03050a;
  --bg-1:      #060810;
  --surface:   #090e18;
  --surface-2: #0d1420;
  --raised:    #111824;
  --border:    #162030;
  --border-2:  #1d2c3e;
  --border-hi: #2a3e54;

  --text:      #e2e8f0;
  --text-dim:  #7d8fa3;
  --text-mute: #3d5068;
  --text-faint:#243040;

  --em:        #10b981;
  --em-bright: #34d399;
  --em-glow:   rgba(16,185,129,0.5);
  --em-veil:   rgba(16,185,129,0.07);
  --em-veil-2: rgba(52,211,153,0.12);

  --font: "Space Grotesk", system-ui, sans-serif;
  --mono: "JetBrains Mono", ui-monospace, monospace;

  --r-sm:  6px;
  --r-md:  10px;
  --r-lg:  14px;
  --r-xl:  20px;
  --r-2xl: 28px;

  --nav-h: 58px;
  --shell: 1360px;
}

*, *::before, *::after { box-sizing: border-box; }
html { scroll-behavior: smooth; }
html, body { margin: 0; padding: 0; width: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-feature-settings: "ss01","ss02","cv11";
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
}

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }
img { display: block; }
::selection { background: #0a3020; color: var(--em-bright); }

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 8px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-hi); }

h1,h2,h3,h4 { margin: 0; font-weight: 500; letter-spacing: -0.025em; line-height: 1.05; }
h2 { font-size: clamp(34px,4.5vw,68px); font-weight: 400; letter-spacing: -0.03em; }
p  { margin: 0; color: var(--text-dim); line-height: 1.6; }

.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--em);
  box-shadow: 0 0 0 3px var(--em-veil), 0 0 12px var(--em-glow);
  animation: livepulse 2s ease-in-out infinite;
  flex-shrink: 0;
  display: inline-block;
}
@keyframes livepulse {
  0%,100% { box-shadow: 0 0 0 3px var(--em-veil), 0 0 8px var(--em-glow); }
  50%      { box-shadow: 0 0 0 6px rgba(16,185,129,0.15), 0 0 20px var(--em-glow); }
}

.grad-head {
  background: linear-gradient(175deg, #f0f4f8 0%, #b0bec8 50%, #4a6070 100%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}

.shell { max-width: var(--shell); margin: 0 auto; padding: 0 28px; }

.line-label {
  display: flex; align-items: center; gap: 14px;
  font-family: var(--mono); font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.18em; color: var(--text-mute);
  margin-bottom: 28px;
}
.line-label::before, .line-label::after {
  content: ""; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, var(--border-2), transparent);
}

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  height: 40px; padding: 0 18px; border-radius: var(--r-md);
  font-size: 13px; font-weight: 500; letter-spacing: -0.01em;
  border: 1px solid transparent; cursor: pointer;
  transition: all 0.15s ease; white-space: nowrap;
  position: relative; overflow: hidden; font-family: var(--font);
}
.btn::before {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.04), transparent);
  pointer-events: none;
}
.btn:active { transform: translateY(1px); }
.btn-ghost { background: transparent; color: var(--text-dim); border-color: transparent; }
.btn-ghost:hover { color: var(--text); background: var(--surface); }
.btn-outline { background: var(--surface-2); color: var(--text); border-color: var(--border-2); }
.btn-outline:hover { border-color: var(--border-hi); background: var(--raised); }
.btn-primary {
  background: linear-gradient(180deg, #0b2218 0%, #061410 100%);
  border-color: rgba(52,211,153,0.4); color: var(--em-bright);
  box-shadow: 0 0 30px -8px rgba(16,185,129,0.35), inset 0 1px 0 rgba(52,211,153,0.15);
}
.btn-primary:hover {
  border-color: rgba(52,211,153,0.65);
  box-shadow: 0 0 44px -6px rgba(16,185,129,0.55), inset 0 1px 0 rgba(52,211,153,0.25);
}
.btn-em {
  background: linear-gradient(180deg, #0f9060 0%, #0a7048 100%);
  border-color: var(--em); color: #fff;
  box-shadow: 0 4px 24px -6px rgba(16,185,129,0.5);
}
.btn-em:hover { box-shadow: 0 6px 32px -4px rgba(16,185,129,0.7); }
.btn-lg { height: 52px; padding: 0 28px; font-size: 15px; border-radius: var(--r-lg); }

/* ── Top Nav ── */
.topnav {
  position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h);
  z-index: 200;
  background: rgba(3,5,10,0.85);
  backdrop-filter: blur(24px) saturate(160%);
  -webkit-backdrop-filter: blur(24px) saturate(160%);
  border-bottom: 1px solid rgba(22,32,48,0.8);
}
.topnav-inner {
  height: 100%; max-width: var(--shell); margin: 0 auto; padding: 0 28px;
  display: flex; align-items: center; gap: 28px;
}
.brand {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--mono); font-size: 13px; font-weight: 500;
  letter-spacing: 0.05em; color: var(--text); flex-shrink: 0;
}
.brand .v1-tag {
  font-size: 10px; padding: 2px 7px; border-radius: 4px;
  background: var(--em-veil); border: 1px solid rgba(52,211,153,0.25);
  color: var(--em-bright); letter-spacing: 0.08em;
}
.nav-links { display: flex; gap: 2px; }
.nav-links a {
  font-size: 13px; color: var(--text-dim);
  padding: 7px 13px; border-radius: var(--r-sm);
  transition: color 0.12s, background 0.12s;
}
.nav-links a:hover { color: var(--text); background: var(--surface); }
.nav-links a.active { color: var(--em-bright); }
.nav-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.nav-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 12px; border-radius: 999px;
  border: 1px solid var(--border-2); background: var(--surface);
  font-family: var(--mono); font-size: 11px; color: var(--text-dim);
}
.nav-pill .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--em); box-shadow: 0 0 8px var(--em-glow); }

.hamburger {
  display: none; flex-direction: column; gap: 5px; cursor: pointer;
  background: none; border: none; padding: 6px; color: var(--text-dim);
}
.hamburger svg { width: 20px; height: 20px; }
.mobile-menu {
  display: none; position: fixed; top: var(--nav-h); left: 0; right: 0;
  background: rgba(3,5,10,0.97); border-bottom: 1px solid var(--border);
  backdrop-filter: blur(24px); z-index: 190; padding: 16px;
  flex-direction: column; gap: 4px;
}
.mobile-menu.open { display: flex; }
.mobile-menu a {
  font-size: 14px; color: var(--text-dim); padding: 10px 14px;
  border-radius: var(--r-sm); transition: all 0.12s;
}
.mobile-menu a:hover { color: var(--text); background: var(--surface); }
.mobile-menu a.active { color: var(--em-bright); }
.mobile-ctas { display: flex; gap: 8px; padding: 8px 0 4px; }

/* ── Hero ── */
.hero-wrap {
  position: relative; min-height: 100vh;
  overflow: hidden; background: #000;
  display: flex; flex-direction: column;
}
.hero-video-bg { position: absolute; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
.hero-video-bg video {
  position: absolute; top: 50%; left: 50%;
  min-width: 100%; min-height: 100%;
  width: auto; height: auto;
  transform: translate(-50%, -50%);
  object-fit: cover;
}
.hero-overlay {
  position: absolute; inset: 0; z-index: 1; pointer-events: none;
  background: linear-gradient(180deg, rgba(0,0,0,0.15) 0%, transparent 40%, rgba(0,0,0,0.5) 100%);
}
.hero-inner {
  position: relative; z-index: 2; width: 100%;
  max-width: var(--shell); margin: 0 auto; padding: 100px 28px 0; flex: 1;
}
.hero-tag {
  font-family: var(--mono); font-size: 10px; letter-spacing: .28em;
  text-transform: uppercase; color: var(--text-mute); margin-bottom: 28px;
  display: flex; align-items: center; gap: 10px;
  text-shadow: 0 1px 8px rgba(0,0,0,0.9);
}
.hero-h1 {
  font-size: clamp(52px, 8vw, 120px);
  font-weight: 300; letter-spacing: -0.045em; line-height: 0.95;
  background: linear-gradient(175deg, #f2f6fa 0%, #9eb0c0 45%, #3d5568 100%);
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 28px;
  filter: drop-shadow(0 2px 20px rgba(0,0,0,0.8));
}
.hero-h1 .em {
  background: linear-gradient(130deg, #34d399, #10b981);
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
}
.hero-sub {
  font-size: clamp(15px, 1.4vw, 19px); color: var(--text-dim);
  max-width: 560px; line-height: 1.65; margin-bottom: 40px;
  text-shadow: 0 1px 12px rgba(0,0,0,0.9);
}
.hero-ctas { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 64px; }
.hero-stat { font-family: var(--mono); font-size: 11px; color: var(--text-mute); }

.hero-ticker-bar {
  position: relative; z-index: 2;
  max-width: var(--shell); margin: 0 auto; padding: 24px 28px;
  display: flex; justify-content: space-between; align-items: center;
  font-family: var(--mono); font-size: 11px; color: var(--text-mute);
  letter-spacing: .1em; border-top: 1px solid rgba(22,32,48,0.6);
  flex-wrap: wrap; gap: 16px;
  background: linear-gradient(0deg, rgba(3,5,10,0.8), transparent);
}
.hero-ticker { display: flex; gap: 32px; flex-wrap: wrap; }
.hero-ticker span b { color: var(--text); font-weight: 500; margin-left: 6px; }

/* ── Marquee ── */
.marquee {
  overflow: hidden; padding: 16px 0;
  border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  background: var(--bg-1);
  mask-image: linear-gradient(90deg, transparent, black 10%, black 90%, transparent);
  -webkit-mask-image: linear-gradient(90deg, transparent, black 10%, black 90%, transparent);
}
.marquee-track { display: inline-flex; gap: 48px; animation: scroll 35s linear infinite; padding-right: 48px; }
@keyframes scroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
.marquee-item {
  font-family: var(--mono); font-size: 11px; color: var(--text-mute);
  text-transform: uppercase; letter-spacing: 0.14em;
  display: inline-flex; align-items: center; gap: 12px; white-space: nowrap;
}
.marquee-item::before { content: "//"; color: var(--em-bright); }

/* ── Surface cards ── */
.surfaces-grid {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 2px;
  border: 1px solid var(--border); border-radius: var(--r-xl); overflow: hidden;
  background: var(--border);
}
.surf-card {
  background: var(--surface); padding: 32px 28px;
  display: flex; flex-direction: column; gap: 14px;
  cursor: pointer; transition: background 0.15s;
  text-decoration: none; color: inherit;
  position: relative; overflow: hidden;
}
.surf-card::after {
  content: ""; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 0% 0%, rgba(16,185,129,0.08), transparent 60%);
  opacity: 0; transition: opacity 0.3s;
}
.surf-card:hover { background: var(--surface-2); }
.surf-card:hover::after { opacity: 1; }
.surf-icon { width: 36px; height: 36px; color: var(--text-mute); }
.surf-title { font-size: 17px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
.surf-desc { font-size: 13px; color: var(--text-dim); line-height: 1.55; }
.surf-tag {
  margin-top: auto; font-family: var(--mono); font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.12em; color: #60a5fa; display: inline-flex; align-items: center; gap: 6px;
}

/* ── Manifesto ── */
.manifesto-band {
  border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, var(--bg-1), var(--bg));
  padding: 120px 0; position: relative; overflow: hidden;
}
.manifesto-band::before {
  content: ""; position: absolute; left: -20%; top: -50%;
  width: 60%; height: 200%;
  background: radial-gradient(ellipse, rgba(16,185,129,0.07), transparent 70%);
  pointer-events: none;
}
.manifesto-text {
  font-size: clamp(26px, 3vw, 48px); font-weight: 300; letter-spacing: -0.025em;
  color: var(--text); line-height: 1.3; max-width: 22ch;
}
.manifesto-text em { font-style: normal; color: var(--em-bright); }

/* ── CTA ── */
.cta-band { padding: 100px 0; }
.cta-card {
  background: linear-gradient(150deg, #081a12 0%, #04090f 60%, #080e18 100%);
  border: 1px solid rgba(52,211,153,0.22); border-radius: var(--r-2xl);
  padding: 80px 72px; position: relative; overflow: hidden;
}
.cta-card::before {
  content: ""; position: absolute; top: -1px; left: 10%; right: 10%; height: 1px;
  background: linear-gradient(90deg, transparent, var(--em-bright), transparent);
}
.cta-card::after {
  content: ""; position: absolute; right: -100px; top: -100px;
  width: 400px; height: 400px; border-radius: 50%;
  background: radial-gradient(ellipse, rgba(16,185,129,0.12), transparent 70%);
  pointer-events: none;
}
.cta-inner { position: relative; z-index: 1; display: grid; grid-template-columns: 1.3fr 1fr; gap: 64px; align-items: center; }

.email-row {
  display: flex; background: var(--surface-2); border: 1px solid var(--border-2);
  border-radius: var(--r-lg); padding: 5px; align-items: center;
  transition: all 0.18s; margin-bottom: 12px;
}
.email-row:focus-within { border-color: rgba(52,211,153,0.45); box-shadow: 0 0 0 4px rgba(16,185,129,0.07); }
.email-row input {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text); padding: 11px 14px; font-family: inherit; font-size: 14px;
}
.email-row input::placeholder { color: var(--text-mute); }

.invite-success {
  display: flex; align-items: center; gap: 10px; padding: 16px 20px;
  background: var(--em-veil); border: 1px solid rgba(52,211,153,.3);
  border-radius: var(--r-lg); color: var(--em-bright); font-family: var(--mono); font-size: 13px;
}
.invite-success svg { width: 16px; height: 16px; flex-shrink: 0; }

/* ── Footer ── */
.site-footer { border-top: 1px solid var(--border); background: var(--bg); padding: 80px 0 32px; }
.footer-grid { display: grid; grid-template-columns: 1.8fr repeat(4,1fr); gap: 48px; margin-bottom: 80px; }
.foot-col h5 {
  font-family: var(--mono); font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.14em; color: var(--text-mute); margin: 0 0 18px; font-weight: 500;
}
.foot-col ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
.foot-col a { color: var(--text-dim); font-size: 13px; transition: color 0.12s; }
.foot-col a:hover { color: var(--em-bright); }
.foot-brand-desc { font-size: 13px; color: var(--text-mute); max-width: 300px; line-height: 1.6; margin-top: 16px; }
.foot-bottom {
  border-top: 1px solid var(--border); padding-top: 24px;
  display: flex; justify-content: space-between; align-items: center;
  font-family: var(--mono); font-size: 11px; color: var(--text-mute); flex-wrap: wrap; gap: 14px;
}
.foot-bottom a:hover { color: var(--em-bright); }

/* ── Neural canvas ── */
#hero-canvas {
  position: absolute; inset: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}

/* ── Responsive ── */
@media (max-width: 900px) {
  .surfaces-grid { grid-template-columns: 1fr 1fr; }
  .cta-inner { grid-template-columns: 1fr; gap: 36px; }
  .cta-card { padding: 48px 36px; }
  .footer-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 768px) {
  .nav-links { display: none; }
  .nav-pill { display: none; }
  .hamburger { display: flex; }
  .footer-grid { grid-template-columns: 1fr; }
}
@media (max-width: 600px) {
  .surfaces-grid { grid-template-columns: 1fr; }
  .hero-ctas { flex-direction: column; align-items: flex-start; }
  .hero-ticker-bar { flex-direction: column; align-items: flex-start; }
}
</style>
</head>

<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useRef, useEffect } = React;

/* ── Icons ── */
const I = {
  chat:   () => <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4"><path d="M3 3.5h10v7H7.5L4 14v-3.5H3z"/></svg>,
  code:   () => <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4"><path d="M5 5 2 8l3 3M11 5l3 3-3 3M9 3l-2 10"/></svg>,
  agent:  () => <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4"><circle cx="8" cy="8" r="2.5"/><circle cx="8" cy="8" r="5.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2"/></svg>,
  api:    () => <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4"><path d="M2 8h4M10 8h4M8 2v4M8 10v4M5 5l2 2M9 9l2 2M11 5l-2 2M7 9l-2 2"/></svg>,
  models: () => <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4"><circle cx="4" cy="8" r="2"/><circle cx="12" cy="4" r="2"/><circle cx="12" cy="12" r="2"/><path d="M6 8h4M6 7.5L10 4M6 8.5L10 12"/></svg>,
  lock:   () => <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4"><rect x="3.5" y="7.5" width="9" height="6"/><path d="M5.5 7.5V5a2.5 2.5 0 0 1 5 0v2.5"/></svg>,
  arrow:  () => <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M3 8h10M9 4l4 4-4 4"/></svg>,
  check:  () => <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.7"><path d="m3 8 3.5 3.5L13 5"/></svg>,
  menu:   () => <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M2 4h12M2 8h12M2 12h12"/></svg>,
  close:  () => <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M4 4l8 8M12 4l-8 8"/></svg>,
};

/* ── Brand Mark SVG ── */
function BrandMark({ size = 24 }) {
  return (
    <svg viewBox="0 0 44 44" width={size} height={size} aria-hidden="true">
      <defs>
        <linearGradient id="bm1" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stopColor="#d0dae6"/>
          <stop offset="55%" stopColor="#5a6878"/>
          <stop offset="100%" stopColor="#1a2030"/>
        </linearGradient>
        <linearGradient id="bm2" x1="0" y1="1" x2="0" y2="0">
          <stop offset="0%" stopColor="#10b981" stopOpacity="0.9"/>
          <stop offset="100%" stopColor="#34d399" stopOpacity="0"/>
        </linearGradient>
        <filter id="bmglow">
          <feGaussianBlur stdDeviation="1.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <path d="M22 3 L40 38 H4 Z" fill="url(#bm1)" stroke="#2a3848" strokeWidth="0.8"/>
      <path d="M13 30 L22 15 L31 30 L26.5 30 L22 22 L17.5 30 Z"
            fill="#04080f" stroke="#34d399" strokeWidth="0.7" filter="url(#bmglow)" opacity="0.95"/>
      <line x1="4" y1="38" x2="40" y2="38" stroke="url(#bm2)" strokeWidth="1.4"/>
    </svg>
  );
}

/* ── Neural Canvas (animated background) ── */
function NeuralCanvas() {
  const ref = useRef(null);
  useEffect(() => {
    const canvas = ref.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let raf, w, h;
    const nodes = [], packets = [];

    function resize() {
      w = canvas.width = canvas.offsetWidth;
      h = canvas.height = canvas.offsetHeight;
    }
    function init() {
      nodes.length = 0;
      const count = Math.floor((w * h) / 18000);
      for (let i = 0; i < count; i++) {
        nodes.push({
          x: Math.random() * w, y: Math.random() * h,
          r: Math.random() * 1.5 + 0.5,
          vx: (Math.random() - 0.5) * 0.15,
          vy: (Math.random() - 0.5) * 0.15,
          pulse: Math.random() * Math.PI * 2,
        });
      }
    }
    function spawnPacket(a, b) {
      packets.push({ ax:a.x, ay:a.y, bx:b.x, by:b.y, t:0, speed:0.008 + Math.random()*0.006 });
    }
    let frame = 0;
    function tick() {
      ctx.clearRect(0, 0, w, h);
      frame++;
      for (const n of nodes) {
        n.x += n.vx; n.y += n.vy; n.pulse += 0.02;
        if (n.x < 0 || n.x > w) n.vx *= -1;
        if (n.y < 0 || n.y > h) n.vy *= -1;
      }
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const a = nodes[i], b = nodes[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const d = Math.sqrt(dx*dx + dy*dy);
          if (d < 160) {
            const alpha = (1 - d / 160) * 0.18;
            ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = `rgba(16,185,129,${alpha})`; ctx.lineWidth = 0.6; ctx.stroke();
            if (frame % 180 === 0 && Math.random() < 0.04) spawnPacket(a, b);
          }
        }
      }
      for (let i = packets.length - 1; i >= 0; i--) {
        const p = packets[i]; p.t += p.speed;
        if (p.t >= 1) { packets.splice(i, 1); continue; }
        const x = p.ax + (p.bx - p.ax) * p.t;
        const y = p.ay + (p.by - p.ay) * p.t;
        ctx.beginPath(); ctx.arc(x, y, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = "#34d399"; ctx.shadowColor = "#10b981"; ctx.shadowBlur = 8;
        ctx.fill(); ctx.shadowBlur = 0;
      }
      for (const n of nodes) {
        const pulse = 0.5 + 0.5 * Math.sin(n.pulse);
        ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(52,211,153,${0.4 + pulse * 0.4})`; ctx.fill();
      }
      raf = requestAnimationFrame(tick);
    }
    const ro = new ResizeObserver(() => { resize(); init(); });
    ro.observe(canvas.parentElement || canvas);
    resize(); init(); tick();
    return () => { cancelAnimationFrame(raf); ro.disconnect(); };
  }, []);
  return <canvas ref={ref} id="hero-canvas"/>;
}
